# DATA SENTINEL — compose de PRODUCCION para el VPS.
#
# A diferencia de docker-compose.yml (que construye las imagenes localmente),
# este archivo SOLO referencia imagenes ya publicadas en Docker Hub — no
# necesita el codigo fuente ni contexto de build. Es el unico archivo (junto
# con .env) que se copia al VPS. Ver docs/DEPLOY_VPS.md para el flujo completo.
#
# Uso en el VPS:
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d

services:
  api:
    image: ${DOCKERHUB_USER}/datasentinel-api:${IMAGE_TAG:-latest}
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      APP_METADATA_DATABASE_URL: ${APP_METADATA_DATABASE_URL:-}
      DATABASE_URL: ${DATABASE_URL:-}
      API_ENV: production
      API_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTH_ALLOWED_EMAIL_DOMAIN: ${AUTH_ALLOWED_EMAIL_DOMAIN:-lazarza.com.mx}
      PASSWORD_HASH_ALGORITHM: ${PASSWORD_HASH_ALGORITHM:-bcrypt}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_TOKEN_EXPIRE_MINUTES: ${AUTH_TOKEN_EXPIRE_MINUTES:-480}
      ETL_SCHEMA: ${ETL_SCHEMA:-etl_execution_aws}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    restart: unless-stopped
    networks:
      - datasentinel

  web:
    image: ${DOCKERHUB_USER}/datasentinel-web:${IMAGE_TAG:-latest}
    environment:
      API_BASE_URL: ${API_BASE_URL:-}
    ports:
      # Atado a 127.0.0.1: NO expuesto directamente a Internet. El nginx del
      # host (con TLS via certbot) es quien recibe el trafico publico y lo
      # reenvia aqui. Ver docs/DEPLOY_VPS.md paso "nginx del host + TLS".
      - "127.0.0.1:${WEB_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - datasentinel

networks:
  datasentinel:
    driver: bridge
