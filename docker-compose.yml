services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      APP_METADATA_DATABASE_URL: ${APP_METADATA_DATABASE_URL:-}
      DATABASE_URL: ${DATABASE_URL:-}
      API_ENV: ${API_ENV:-production}
      API_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTH_ALLOWED_EMAIL_DOMAIN: ${AUTH_ALLOWED_EMAIL_DOMAIN:-lazarza.com.mx}
      PASSWORD_HASH_ALGORITHM: ${PASSWORD_HASH_ALGORITHM:-bcrypt}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_TOKEN_EXPIRE_MINUTES: ${AUTH_TOKEN_EXPIRE_MINUTES:-480}
      ETL_SCHEMA: ${ETL_SCHEMA:-etl_execution_aws}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
    restart: unless-stopped
    networks:
      - datasentinel

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      # URL publica del API vista por el navegador. Vacio = mismo origen
      # (nginx de este contenedor proxya /api/ hacia el servicio "api").
      API_BASE_URL: ${API_BASE_URL:-}
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - datasentinel

networks:
  datasentinel:
    driver: bridge
