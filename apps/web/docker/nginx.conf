server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # env.js se regenera en cada arranque del contenedor (docker-entrypoint.sh) —
    # nunca debe quedar cacheado por el navegador.
    location = /env.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    # SPA routing: cualquier ruta no encontrada cae a index.html
    # (react-router-dom con BrowserRouter, ej. /executions/123 al refrescar).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend por nombre de servicio de docker-compose.
    # Mismo origen desde el navegador -> sin problemas de CORS.
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
